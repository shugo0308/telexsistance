<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena & Hermes Control Center</title>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 画面中央のメインスクリーン */
        .screen-container {
            margin-top: 20px;
            padding: 15px;
            background: #2d2d2d;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.7);
            text-align: center;
        }

        /* 現在どっちの映像かを表示するラベル */
        #view_label {
            margin-bottom: 10px;
            font-weight: bold;
            color: #3498db;
        }

        img {
            max-width: 800px;
            width: 100%;
            height: auto;
            border-radius: 8px;
            background: #000;
        }

        /* 操作パネル（ボタンを横並びにする） */
        .controls {
            margin: 20px;
            padding: 20px;
            background: #2d2d2d;
            border-radius: 12px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        /* 接続ボタン */
        .btn-connect {
            background: #f1c40f;
            color: #000;
        }

        /* アクションボタン */
        .btn-calib {
            background: #3498db;
            color: white;
        }
        /* 補正 */
        .btn-switch {
            background: #2ecc71;
            color: white;
        }
        /* 画面切替 */
        .btn-reset {
            background: #e74c3c;
            color: white;
        }
        /* リセット */

        button:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        /* 接続ステータス */
        .status-bar {
            color: #aaa;
            font-size: 13px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <h1>Project OLYMPUS</h1>

    <div class="screen-container">
        <div id="view_label">Athena: Tracking Mode</div>
        <img id="main_screen" src="">
        <div id="conn_status" class="status-bar">Connection: Connecting...</div>
    </div>

    <div class="controls">
        <button class="btn-connect" id="btn_hid">🎮 ハンコン接続</button>
        <button class="btn-calib" onclick="sendControlRequest('center')">0点補正実行</button>
        <button class="btn-reset" onclick="sendControlRequest('reset')">オフセット初期化</button>

        <button class="btn-switch" onclick="toggleView()">映像切り替え (Athena ⇄ Hermes)</button>
    </div>

    <div id="debugOut" style="font-family: monospace; color: #00ff00; margin: 10px;"></div>

    <div class="screen-container">

        <div id="angle_display" style="font-size: 24px; color: #ffcc00; margin-bottom: 5px; font-weight: bold;">
            Yaw: 0.0° | Pitch: 0.0°
        </div>
    </div>

    <script>

        // --- WebSocket設定 ---

        // 1. 変数宣言（重複がないよう1回だけに絞る）
        let currentMode = 'athena';// 表示モード管理 (athena または hermes)
        let mainScreen = document.getElementById('main_screen'); // IDをメインスクリーンに統一
        const viewLabel = document.getElementById('view_label');
        const connStatus = document.getElementById('conn_status');
        // 角度表示用の要素を取得
        const angleDisplay = document.getElementById('angle_display');
        const debugOut = document.getElementById('debugOut');

        // 2. WebSocketのURLを構築（テンプレートリテラルを確実に使用）
        const driveUrl = "ws://192.168.0.41:8000/ws/drive"; // 走行用WS
        const athenaUrl = "ws://" + window.location.host + "/ws";
        const hermesUrl = "ws://192.168.0.41:8000/ws/video";
        
        const driveWS = new WebSocket(driveUrl);
        driveWS.onclose = () => {
            console.warn("Drive WS 切断");
            connStatus.innerText = "⚠️ Drive接続が切断されました";
        };
        driveWS.onerror = (e) => {
            console.error("Drive WS Error:", e);
        };

        const athenaWS = new WebSocket(athenaUrl);
        athenaWS.onclose = () => {
            connStatus.innerText = "⚠️ Athena接続が切断されました";
        };
        athenaWS.onerror = (e) => {
            console.error("Athena WS Error:", e);
            connStatus.innerText = "❌ Athena接続エラー";
        };

        //const hermesWS = new WebSocket(hermesUrl);

        // ✅ hermesWSは toggleView() で初めて接続する遅延接続方式に変更
        let hermesWS = null;

        function toggleView() {
            if (currentMode === 'athena') {
                currentMode = 'hermes';
                viewLabel.innerText = "Hermes: Navigation Mode";
                viewLabel.style.color = "#2ecc71";
                // 初回だけ接続を張る
                if (!hermesWS || hermesWS.readyState === WebSocket.CLOSED) {
                    hermesWS = new WebSocket(hermesUrl);
                    hermesWS.onmessage = hermesOnMessage; // 関数を分離して再利用
                }
            } else {
                currentMode = 'athena';
                viewLabel.innerText = "Athena: Tracking Mode";
                viewLabel.style.color = "#3498db";
            }
            mainScreen.src = "";
        }
        

        athenaWS.onmessage = (event) => {
            if (currentMode === 'athena') {
                try {
                    // 文字列をJSONオブジェクトとして解析する
                    const data = JSON.parse(event.data);

                    // 解析したJSONの中から "img" キー（Base64文字列）だけを抽出して表示
                    // 1. 画像の更新
                    if (data.img) {
                        mainScreen.src = "data:image/jpeg;base64," + data.img;
                    }

                    // 2. 角度の更新 (yが左右、pが上下)
                    if (data.y !== undefined && data.p !== undefined) {
                        // 小数点第1位まで表示
                        angleDisplay.innerText = `Yaw: ${data.y.toFixed(1)}° | Pitch: ${data.p.toFixed(1)}°`;
                    }

                    // アテナモードの時は角度を表示、エルメスモードの時は隠すなどの制御も可能
                    angleDisplay.style.visibility = "visible";
                } catch (e) {
                    console.error("Athena JSON Parse Error:", e);
                }
            }
        };

        function hermesOnMessage(event) {
            if (currentMode === 'hermes') {
                // エルメス側の送信形式に合わせて調整（通常はバイナリか、imgキー付きJSON）
                try {
                    const data = JSON.parse(event.data);
                    if (data.type == "video" && data.data) {
                        mainScreen.src = "data:image/jpeg;base64," + data.data;
                    } 
                } catch (e) {
                    // JSONでない（生のバイナリ等の）場合はこちら
                    console.error("Hermes data parse error:", e);
                }
            }
        };

        document.getElementById('btn_hid').addEventListener('click', async () => {
            try {
                // ハンコン取得
                const devices = await navigator.hid.requestDevice({ filters: [{ vendorId: 0x046d, productId: 0xc298 }] });
                if (devices.length === 0) return;
                const device = devices[0];
                await device.open();

                connStatus.innerText = `Connected: ${device.productName}`;

                device.addEventListener('inputreport', (event) => {
                    const { data } = event;
                    const view = new DataView(data.buffer);

                    // ステアリング (14bit) -> 0-255
                    const steerFull = view.getUint16(0, true);
                    const steerRaw = Math.min(255, Math.floor((steerFull / 16383) * 255));

                    // ボタン・ペダル
                    const buttons = view.getUint8(2);
                    const driveRaw = view.getUint8(4);
                    const statusFlag = view.getUint8(7);

                    let throttle = 0;
                    let brake = 0;
                    if (driveRaw < 0x80) throttle = (0x80 - driveRaw) / 128.0;
                    else if (driveRaw > 0x80) brake = (driveRaw - 0x80) / 127.0;

                    const payload = {
                        throttle: parseFloat(throttle.toFixed(2)),
                        brake: parseFloat(brake.toFixed(2)),
                        isBackMode: (buttons === 0x02), // △ボタン
                        isNeutral: (statusFlag === 0x3f),
                        steer: steerRaw
                    };

                    // エルメスへ送信
                    if (driveWS && driveWS.readyState === WebSocket.OPEN) {
                        driveWS.send(JSON.stringify(payload));
                    }
                    debugOut.innerText = `STEER: ${steerRaw} | THR: ${payload.throttle} | BRK: ${payload.brake}`;
                    
                });
            } catch (err) {
                console.error(err);
                connStatus.innerText = "Error: " + err.message;
            }
        });

        // --- 機能関数 ---

        // 映像ソースの切り替え
        /*function toggleView() {
            if (currentMode === 'athena') {
                currentMode = 'hermes';
                viewLabel.innerText = "Hermes: Navigation Mode";
                viewLabel.style.color = "#2ecc71"; // 緑に変更
            } else {
                currentMode = 'athena';
                viewLabel.innerText = "Athena: Tracking Mode";
                viewLabel.style.color = "#3498db"; // 青に変更
            }
            // 切り替え時に一瞬画面をクリア（残像防止）
            mainScreen.src = "";
        }*/

        // コマンド送信（補正など）
        function sendControlRequest(mode) {
            if (athenaWS.readyState === WebSocket.OPEN) {
                athenaWS.send(JSON.stringify({ type: "mode", value: mode }));
                alert(`補正コマンド [${mode}] を送信しました`);
            } else {
                alert("⚠️ Athenaに接続されていません");
            }
        }

        // 接続状態の監視
        setInterval(() => {
            const aState = athenaWS.readyState === 1 ? "ON" : "OFF";
            const hState = hermesWS && hermesWS.readyState === 1 ? "ON" : "OFF";
            connStatus.innerText = `Network Status | Athena: ${aState} | Hermes: ${hState}`;
        }, 2000);

    </script>
</body>
</html>
